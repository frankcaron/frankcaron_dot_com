<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>SHADOW STRIKE: Tactical Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0c0f;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
canvas#game{display:block;width:100%;height:100%}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10;font-family:'Rajdhani',sans-serif;color:#c8d8c0}
#hud *{pointer-events:none}
.hud-top{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px}
.hud-health{display:flex;align-items:center;gap:8px}
.health-bar-bg{width:140px;height:10px;background:rgba(0,0,0,.6);border:1px solid rgba(100,200,100,.4);border-radius:2px;overflow:hidden}
.health-bar-fill{height:100%;background:linear-gradient(90deg,#4a8f4a,#6fd66f);transition:width .3s}
.health-text{font-size:14px;font-weight:600;font-family:'Share Tech Mono',monospace;text-shadow:0 1px 4px rgba(0,0,0,.8);font-variant-numeric:tabular-nums lining-nums}
.hud-score{text-align:right}
.hud-score div{font-size:13px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.8);font-family:'Share Tech Mono',monospace;font-variant-numeric:tabular-nums lining-nums}
.hud-weapon{position:fixed;bottom:14px;right:16px;text-align:right}
@media (pointer:coarse){.hud-weapon{bottom:auto;top:50px;right:16px}}
.weapon-name{font-size:16px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.8);letter-spacing:1px}
.ammo-count{font-size:28px;font-weight:700;font-family:'Share Tech Mono',monospace;text-shadow:0 1px 4px rgba(0,0,0,.8);font-variant-numeric:tabular-nums lining-nums}
.ammo-reserve{font-size:14px;color:#8a9a80;font-family:'Share Tech Mono',monospace;font-variant-numeric:tabular-nums lining-nums}

/* Crosshair */
#crosshair{position:fixed;top:0;left:0;pointer-events:none;z-index:15;-webkit-transform:translate3d(0,0,0);will-change:transform}

/* Kill feed */
#killfeed{position:fixed;top:60px;right:16px;display:flex;flex-direction:column;gap:4px;pointer-events:none;z-index:10}
.kill-msg{font-size:12px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.8);font-family:'Share Tech Mono',monospace;color:#c8d8c0;white-space:nowrap}

/* Minimap */
#minimap-container{position:fixed;bottom:12px;left:12px;pointer-events:none;z-index:10}
@media (pointer:coarse){#minimap-container{bottom:auto;top:50px;left:12px}}
#minimap{border:1px solid rgba(100,200,100,.3);border-radius:4px;background:rgba(0,0,0,.5)}

/* Touch controls */
#touch-controls{position:fixed;bottom:0;left:0;right:0;top:0;z-index:20;display:none;pointer-events:none}
.touch-active #touch-controls{display:block}

/* Touch zones — full height so aim dragging works everywhere */
#touch-left{position:absolute;bottom:0;left:0;width:40%;height:100%;pointer-events:auto}
#touch-right{position:absolute;bottom:0;right:0;width:60%;height:100%;pointer-events:auto}

/* Analog stick bases */
.stick-base{position:absolute;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.05);border:2px solid rgba(255,255,255,.1);pointer-events:none;z-index:22}
.stick-thumb{position:absolute;width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 40% 38%,rgba(255,255,255,.22),rgba(255,255,255,.06));border:2px solid rgba(255,255,255,.18);pointer-events:none;transition:none;left:50%;top:50%;transform:translate(-50%,-50%)}
#move-base{bottom:20px;left:20px}
#aim-base{bottom:20px;right:20px}

/* Action buttons — fire on LEFT side so you can aim+fire simultaneously */
#fire-btn{position:absolute;bottom:60px;left:170px;width:64px;height:64px;border-radius:50%;background:radial-gradient(circle,rgba(255,60,60,.5),rgba(200,30,30,.3));border:2px solid rgba(255,80,80,.55);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:rgba(255,200,200,.9);letter-spacing:1px;pointer-events:auto;z-index:25;-webkit-tap-highlight-color:transparent}
#reload-btn{position:absolute;bottom:134px;left:178px;width:46px;height:46px;border-radius:50%;background:rgba(100,180,255,.15);border:2px solid rgba(100,180,255,.3);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;color:rgba(180,220,255,.8);pointer-events:auto;z-index:25;-webkit-tap-highlight-color:transparent}
#weapon-switch-btn{position:absolute;bottom:190px;left:184px;width:40px;height:40px;border-radius:8px;background:rgba(200,200,100,.12);border:1px solid rgba(200,200,100,.25);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:16px;color:rgba(200,200,100,.7);pointer-events:auto;z-index:25;-webkit-tap-highlight-color:transparent}

/* Title screen */
#title-screen{position:fixed;inset:0;z-index:100;background:#0a0c0f;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}
.title-logo{font-family:'Rajdhani',sans-serif;font-size:clamp(28px,8vw,56px);font-weight:700;color:#c8d8c0;letter-spacing:6px;text-transform:uppercase;text-shadow:0 0 20px rgba(100,200,100,.3),0 2px 8px rgba(0,0,0,.8);line-height:1.1;text-align:center}
.title-sub{font-family:'Share Tech Mono',monospace;font-size:clamp(12px,3vw,16px);color:#6a7a60;letter-spacing:4px;text-transform:uppercase}
.start-btn{margin-top:16px;padding:14px 48px;background:rgba(100,200,100,.15);border:1px solid rgba(100,200,100,.4);border-radius:4px;font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#c8d8c0;letter-spacing:3px;cursor:pointer;pointer-events:auto;transition:background .2s,border-color .2s}
.start-btn:hover,.start-btn:active{background:rgba(100,200,100,.3);border-color:rgba(100,200,100,.7)}
.title-info{font-family:'Share Tech Mono',monospace;font-size:11px;color:#4a5a40;letter-spacing:2px;text-align:center;max-width:320px;line-height:1.6}

/* Game over */
#game-over{position:fixed;inset:0;z-index:100;background:rgba(10,12,15,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#game-over.active{display:flex}
.go-title{font-family:'Rajdhani',sans-serif;font-size:clamp(28px,7vw,48px);font-weight:700;color:#d44;letter-spacing:4px;text-shadow:0 0 20px rgba(200,40,40,.4)}
.go-stats{font-family:'Share Tech Mono',monospace;font-size:14px;color:#8a9a80;text-align:center;line-height:2}
.go-wave{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:600;color:#c8d8c0}

/* Round banner */
#round-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;font-family:'Rajdhani',sans-serif;font-size:clamp(24px,6vw,40px);font-weight:700;color:#c8d8c0;letter-spacing:4px;text-shadow:0 0 20px rgba(100,200,100,.3),0 2px 8px rgba(0,0,0,.8);opacity:0;pointer-events:none;text-align:center;background:none;transition:opacity .5s}

/* Damage flash */
#damage-flash{position:fixed;inset:0;z-index:30;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,rgba(200,0,0,.4));opacity:0;transition:opacity .1s}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="hud-top">
    <div class="hud-health">
      <div class="health-bar-bg"><div class="health-bar-fill" id="health-fill"></div></div>
      <span class="health-text" id="health-text">100</span>
    </div>
    <div class="hud-score">
      <div id="score-display">KILLS: 0</div>
      <div id="wave-display">WAVE 1</div>
    </div>
  </div>
  <div class="hud-weapon">
    <div class="weapon-name" id="weapon-name">M4A1</div>
    <div class="ammo-count" id="ammo-count">30</div>
    <div class="ammo-reserve" id="ammo-reserve">/ 120</div>
  </div>
  <div id="killfeed"></div>
</div>

<div id="crosshair">
  <svg width="32" height="32" viewBox="0 0 32 32">
    <circle cx="16" cy="16" r="2" fill="none" stroke="rgba(100,255,100,.8)" stroke-width="1.5"/>
    <line x1="16" y1="4" x2="16" y2="11" stroke="rgba(100,255,100,.6)" stroke-width="1.5"/>
    <line x1="16" y1="21" x2="16" y2="28" stroke="rgba(100,255,100,.6)" stroke-width="1.5"/>
    <line x1="4" y1="16" x2="11" y2="16" stroke="rgba(100,255,100,.6)" stroke-width="1.5"/>
    <line x1="21" y1="16" x2="28" y2="16" stroke="rgba(100,255,100,.6)" stroke-width="1.5"/>
  </svg>
</div>

<div id="minimap-container">
  <canvas id="minimap" width="130" height="130"></canvas>
</div>

<div id="touch-controls">
  <div id="touch-left"></div>
  <div id="touch-right"></div>
  <div class="stick-base" id="move-base"><div class="stick-thumb" id="move-thumb"></div></div>
  <div class="stick-base" id="aim-base"><div class="stick-thumb" id="aim-thumb"></div></div>
  <div id="fire-btn">FIRE</div>
  <div id="reload-btn">R</div>
  <div id="weapon-switch-btn">&#8645;</div>
</div>

<div id="damage-flash"></div>
<div id="round-banner"></div>

<div id="title-screen">
  <div class="title-logo">SHADOW<br>STRIKE</div>
  <div class="title-sub">Tactical Operations</div>
  <button class="start-btn" id="start-btn">DEPLOY</button>
  <div class="title-info">ELIMINATE HOSTILE FORCES<br>SURVIVE EACH WAVE<br><br>TOUCH: LEFT STICK MOVE &middot; RIGHT AIM<br>KB: WASD MOVE &middot; MOUSE AIM &middot; CLICK SHOOT</div>
</div>

<div id="game-over">
  <div class="go-title">MISSION FAILED</div>
  <div class="go-wave" id="go-wave">WAVE 1</div>
  <div class="go-stats" id="go-stats"></div>
  <button class="start-btn" id="restart-btn">REDEPLOY</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.162.0",
    "three/addons/": "https://esm.sh/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./game.js"></script>
</body>
</html>
